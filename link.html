<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Привязка Discord — Edge of the Force</title>
<link href="assets/favicon.png" rel="icon" type="image/png">
<style>
body{margin:0;min-height:100vh;background:#030712;color:#eef8ff;font-family:Inter,system-ui,sans-serif;display:grid;place-items:center}
.card{width:min(520px,calc(100vw - 32px));background:rgba(8,18,34,.82);border:1px solid rgba(125,211,252,.25);border-radius:22px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
h1{margin:0 0 12px;font-size:26px}
p{color:#9eb4c9;line-height:1.55}
input{width:100%;padding:15px 16px;border-radius:14px;border:1px solid rgba(125,211,252,.28);background:rgba(2,8,18,.8);color:#fff;font-size:22px;letter-spacing:.08em;text-align:center;text-transform:uppercase}
button,a.btn{display:inline-flex;align-items:center;justify-content:center;margin-top:14px;width:100%;padding:14px;border-radius:14px;border:1px solid rgba(125,211,252,.34);background:#0ea5e9;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}
.msg{margin-top:14px;color:#d8f3ff;white-space:pre-wrap}
</style>
</head>
<body>
<div class="card">
<h1>Привязка Discord</h1>
<p>Введи код, который сервер показал после команды <b>/link</b>. Перед подтверждением нужно быть авторизованным на сайте через Discord.</p>
<input id="code" placeholder="КОД">
<button id="confirm">Подтвердить</button>
<a class="btn" href="/api/auth/login">Авторизоваться через Discord</a>
<div class="msg" id="msg"></div>
</div>
<script>
const params = new URLSearchParams(location.search);
const codeInput = document.getElementById('code');
codeInput.value = params.get('code') || '';
document.getElementById('confirm').onclick = async () => {
  const msg = document.getElementById('msg');
  msg.textContent = 'Проверяю...';
  const r = await fetch('/api/link/confirm', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:codeInput.value})
  });
  const data = await r.json().catch(()=>({ok:false,message:'Ошибка ответа'}));
  msg.textContent = data.message || (data.ok ? 'Готово.' : 'Не удалось привязать.');
};
</script>
</body>
</html>
